# Karatag alignment settings
# 汎用性と精度を両立する最終安定設定

[DEFAULT]
# ===========================================================================
# 1. 物理制約パラメータ (隣接する文字や無音の扱い)
# ===========================================================================

# 文字間の最小ギャップ (秒) [Default: 0.01]
min_gap = 0.01

# 1文字の最大持続時間 (秒) [Default: 1.2]
max_char_duration = 1.2

# 1文字の最小持続時間 (秒) [Default: 0.03]
min_char_duration = 0.03


# ===========================================================================
# 2. アライメント精密パラメータ (探索範囲と安定性)
# ===========================================================================

# アライメントモード [ctc / linear / hybrid] [Default: linear]
alignment_mode = linear

# 探索マージン (秒) [Default: 1.5]
search_margin = 1.5

# Whisper アンカー採用スコア (0.0 - 1.0) [Default: 0.9]
# 0.98 に設定し、完璧に一致したアンカー以外は採用しません。
anchor_score = 0.98

# 自動間奏検知 (0.0 でオフ)
auto_interlude_duration = 0.0
auto_interlude_threshold = 0.02


# ===========================================================================
# 楽曲タイプ別プリセット
# ===========================================================================

[preset:standard]
# 標準的なJ-POP。
alignment_mode = hybrid
search_margin = 1.5
anchor_score = 0.98
auto_interlude_duration = 0.0

[preset:fast]
# アイドル曲、ハイテンポ曲向け。
alignment_mode = linear
search_margin = 1.0
anchor_score = 0.85
min_char_duration = 0.01
auto_interlude_duration = 0.0

[preset:ballad]
# スローテンポ、バラード向け。
alignment_mode = ctc
search_margin = 2.0
anchor_score = 0.95
max_char_duration = 2.0
auto_interlude_duration = 0.0
