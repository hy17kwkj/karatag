# Karatag alignment settings (V132)
# 歌声のみ入力（伴奏分離済み）前提での推奨設定

[DEFAULT]
# ===========================================================================
# 1. 物理制約パラメータ
# ===========================================================================

# 文字間の最小ギャップ (秒)
min_gap = 0.01

# 1文字の最大持続時間 (秒)
max_char_duration = 1.2

# 1文字の最小持続時間 (秒)
min_char_duration = 0.03


# ===========================================================================
# 2. アライメント精密パラメータ
# ===========================================================================

# アライメントモード [linear / hybrid] (Default: hybrid)
#   linear : モーラ重み付き均等分配のみ（RMSスナップなし・最も安定）
#   hybrid : linear + 母音ピーク基準オンセットスナップ（推奨）
#   ctc    : 現在 hybrid にフォールバック（Phase 3 で実装予定）
alignment_mode = hybrid

# 探索マージン (秒)。非対称で適用: 後方 = margin*0.5, 前方 = margin
search_margin = 1.5

# Whisper アンカー採用スコア (0.0 - 1.0)
# 歌唱はASRと完全一致しにくいため 0.85 を推奨。
# 被覆率 50% 未満の場合は 0.1 ずつ自動緩和して再試行する。
anchor_score = 0.85

# 自動間奏検知 (0.0 でオフ)
auto_interlude_duration = 0.0
auto_interlude_threshold = 0.02

# 最低歌唱密度 (char/s): これ未満のセグメントはノイズとして除外
min_vocal_density = 0.3


# ===========================================================================
# 楽曲タイプ別プリセット
# ===========================================================================

[preset:standard]
# 標準的なJ-POP。
alignment_mode = hybrid
search_margin = 1.5
anchor_score = 0.85

[preset:fast]
# アイドル曲、ハイテンポ曲向け。
alignment_mode = linear
search_margin = 1.0
anchor_score = 0.80
min_char_duration = 0.01

[preset:ballad]
# スローテンポ、バラード向け。
alignment_mode = hybrid
search_margin = 2.0
anchor_score = 0.85
max_char_duration = 2.0
